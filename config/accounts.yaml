# ═══════════════════════════════════════════════════════════════
# TRADING CONFIG — do NOT modify unless you know what you're doing
# ═══════════════════════════════════════════════════════════════

# Exam mode (phase1 & phase2): aggressive to pass fast
exam_mode:
  risk_per_trade: 0.02    # 2% risk per trade
  daily_cap_pct: 2.0      # Stop trading if daily loss >= 2.0%
  cooldown: 2             # Max 2 losses per combo per day
  max_instr_per_day: 2    # Max 2 trades per instrument per day
  max_daily_losses: 5     # Max 5 total losses per day
  p2_risk_factor: 0.5     # Half risk in Phase 2

# Funded mode: conservative to survive long
funded_mode:
  risk_per_trade: 0.005   # 2% × 0.25 = 0.5% effective risk
  daily_cap_pct: 2.5      # Daily cap
  cooldown: 1             # Max 1 loss per combo per day
  max_instr_per_day: 2
  max_daily_losses: 3

