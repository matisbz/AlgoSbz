# Exam mode: optimized 2026-04-13 via optimize_exam_params.py sweep.
# Config: P1R4_P2R2.0_DC3.5_MI3 on 32-combo FTMO-validated deck.
# Asymmetric risk: aggressive P1 (4%) to hit 10% fast, aggressive P2 (2.0%).
# Results: IS 40.8% funded (25d avg), OOS 27.5% funded (26d avg).
exam_mode:
  risk_per_trade: 0.04    # P1 effective risk = 4.0%
  daily_cap_pct: 3.5
  cooldown: 1
  max_instr_per_day: 3
  max_daily_losses: 3
  p2_risk_factor: 0.5     # Phase2 effective risk = 2.0% (0.04 * 0.5)

# Funded mode: conservative to maximize survival.
# Updated 2026-04-13 with FTMO data recalibration.
funded_mode:
  risk_per_trade: 0.01    # 1.0% effective risk
  daily_cap_pct: 2.5
  cooldown: 1
  max_instr_per_day: 3
  max_daily_losses: 3

