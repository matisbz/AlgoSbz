# Exam mode (phase1 & phase2): from optimizer 2026-04-08 v3 (REAL FTMO spreads
# + spread-resistant + session-filtered presets + 55-combo pool from massive_scan v3).
# Best config: Decorr24_A_DC2.0_CD1_L0_P2x0.7_MI99_ML3 -> 57.0% IS / 57.1% OOS
# (vs v2: 41.1% IS / 57.1% OOS — gained +15.9pp on IS, OOS preserved)
# 2024 funded rate: 40% (was 10% — fixed via decorrelation away from gold cluster)
exam_mode:
  risk_per_trade: 0.02
  daily_cap_pct: 2.0      # Daily cap 2.0% (best from grid, conservative vs 5% hard limit)
  cooldown: 1             # Max 1 loss per combo per day
  max_instr_per_day: 99   # No per-day instrument cap (best from grid with 24 combos)
  max_daily_losses: 3
  p2_risk_factor: 0.7

# Funded mode: from optimizer v3 (RF0.7_DC1.5_CD1_MI99_ML3)
# Avg survival: 15.5 months (was 12.2 — +27%), 27% term rate (was 44%)
# $539/mo net per $5K funded after split (was $216 — 2.5x improvement)
# EV per account: $208,274 lifetime (was ~$96K)
funded_mode:
  risk_per_trade: 0.014   # 0.7x risk factor (RF0.7) -> 0.02 * 0.7
  daily_cap_pct: 1.5
  cooldown: 1
  max_instr_per_day: 99
  max_daily_losses: 3

