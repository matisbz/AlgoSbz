# ═══════════════════════════════════════════════════════════════
# TRADING CONFIG — do NOT modify unless you know what you're doing
# ═══════════════════════════════════════════════════════════════

# Exam mode (phase1 & phase2): overlap-aware reoptimization 2026-04-11.
# Constraint: structural signal overlap veto at 80% on IS trades
# (same symbol + timestamp + direction). Goal: many trades, but no "same idea twice".
# Selected from the clean no-overlap pool after exact production validation:
# Decorr24_A_DC3.5_CD1_L0_P2x0.5_MI2_ML3
# -> 37.4% IS / 28.6% OOS funded rate, with 0 pair overlaps >= 80%
#    and max pair overlap = 27.2%.
exam_mode:
  risk_per_trade: 0.02    # P1 effective risk = 2.0%
  daily_cap_pct: 3.5
  cooldown: 1
  max_instr_per_day: 2
  max_daily_losses: 3
  p2_risk_factor: 0.5     # Phase2 effective risk = 1.0%

# Funded mode: calibrated on the same no-overlap Decorr24_A deck.
# Best EV in funded sim: RF0.5_DC2.5_CD1_MI2_ML3
# -> about 14.5 months average survival, 35% term rate,
#    and about $149 net/month per $5K after 80% split.
funded_mode:
  risk_per_trade: 0.01    # 1.0% effective risk = RF0.5 on 2% base
  daily_cap_pct: 2.5
  cooldown: 1
  max_instr_per_day: 2
  max_daily_losses: 3

