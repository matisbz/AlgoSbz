# Exam mode: optimized 2026-04-12 via optimize_exam_params.py sweep.
# Config: P1R4_P2R1.5_DC3.5_MI2 on 25-combo ALIVE deck (v7_expanded).
# Asymmetric risk: aggressive P1 (4%) to hit 10% fast, moderate P2 (1.5%).
# Results: IS 50.2% funded (26d avg), OOS 10.2% funded (22d avg).
exam_mode:
  risk_per_trade: 0.04    # P1 effective risk = 4.0%
  daily_cap_pct: 3.5
  cooldown: 1
  max_instr_per_day: 2
  max_daily_losses: 3
  p2_risk_factor: 0.375   # Phase2 effective risk = 1.5% (0.04 * 0.375)

# Funded mode: conservative to maximize survival.
# 16.6 months avg survival, 21% termination, EUR +231/mo net per $5K.
funded_mode:
  risk_per_trade: 0.01    # 1.0% effective risk
  daily_cap_pct: 2.5
  cooldown: 1
  max_instr_per_day: 2
  max_daily_losses: 3

